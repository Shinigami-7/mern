<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<body>
    
    <form >
        <fieldset>
            <legend>
                Contact Form
            
            </legend>
            <label for="email">Email:</label>
            <input type="text" id="email" placeholder="Enter your email"><br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="Enter your password"><br><br>
        
        <label for="number">Phone Number:</label>
        <input type="tel" name="number" id="number" placeholder="Enter your phone number"><br><br>

            <label for="date">Date of Birth:</label>
        <input type="date" name="date" id="date"><br><br>

        <label for="gender">Gender:</label>
        <input type="radio" name="gender" value="male" id="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" value="female" id="female">
        <label for="female">Female</label>
        <input type="radio" name="gender" value="other" id="other">
        <label for="other">Other</label><br><br>

        <label for="age">Age:</label>
        <input type="number" name="age" id="age" min="1" max="100"><br><br>

        <select name="language" id="language">
            <option value="english">English</option>
            <option value="spanish">Spanish</option>
            <option value="french">French</option>
            <option value="nepali">Nepali</option>
        </select> <br><br>

        <label for="file">Upload photo:</label>
        <input type="file" name="photo"id="file"><br><br>

        <label for="message">Message:</label><br>
        <textarea name="message" id="message" cols="30" rows="10" placeholder="Enter your message"></textarea><br><br>

        <details>
            <summary>Is this Legal?</summary>
            <p>Yes it is legal.</p>
        </details><br><br>  
        
        
        <input type="checkbox" name="checkbox" id="checkbox">
        <label for="checkbox">I agree to the terms and conditions:</label><br><br>
        
        <input type="submit" value="Submit">
        </fieldset>
    </form>
</body >
</html >
