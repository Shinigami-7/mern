<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition</title>
    <style>
        .box {
            width: 300px;
            height: 300px;
            background-color: red;
            /* transition : height 5s,width 3s; */
            transition: all 3s linear;
        }

        .box:hover {
            width: 700px;
            height: 700px;
            background-color: blue;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="box">

    </div>
    
</body>
</html>
